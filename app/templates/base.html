<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Задачи ТЮФ/ТЮЕ{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=11">
</head>
<body>
  {% if user %}
  <header class="header">
    <div class="header-inner">
      <a href="/kanban" class="logo">Задачи <span>ТЮФ / ТЮЕ</span></a>
      <nav>
        <a href="/kanban">Канбан</a>
        <a href="/">Список</a>
        <a href="/new">Добавить</a>
        <a href="/export/txt" title="Полная выгрузка">TXT</a>
        <a href="/export/csv" title="Полная выгрузка">CSV</a>
        <a href="/settings">Настройки</a>
      </nav>
      <div class="user">{{ user }} · <a href="/logout">Выйти</a></div>
    </div>
  </header>
  {% endif %}

  <main class="{% block main_class %}container{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script>
  document.querySelectorAll('[data-file-drop]').forEach((wrap) => {
    const input = wrap.querySelector('.file-drop-input');
    const chosen = wrap.querySelector('[data-file-chosen]');
    const zone = wrap.querySelector('.file-drop-zone');
    if (!input || !chosen) return;

    const refresh = () => {
      const files = Array.from(input.files || []);
      if (!files.length) {
        chosen.textContent = 'Файлы не выбраны';
        wrap.classList.remove('has-files');
        return;
      }
      wrap.classList.add('has-files');
      if (files.length === 1) {
        chosen.textContent = 'Выбран 1 файл: ' + files[0].name;
      } else {
        const names = files.map(f => f.name).join(', ');
        chosen.textContent = 'Выбрано файлов: ' + files.length + ' — ' + names;
      }
    };

    input.addEventListener('change', refresh);

    ['dragenter', 'dragover'].forEach((evt) => {
      zone.addEventListener(evt, (e) => {
        e.preventDefault();
        wrap.classList.add('is-dragover');
      });
    });
    ['dragleave', 'drop'].forEach((evt) => {
      zone.addEventListener(evt, (e) => {
        e.preventDefault();
        wrap.classList.remove('is-dragover');
      });
    });
    zone.addEventListener('drop', (e) => {
      if (!e.dataTransfer || !e.dataTransfer.files.length) return;
      const dt = new DataTransfer();
      Array.from(e.dataTransfer.files).forEach((f) => dt.items.add(f));
      input.files = dt.files;
      refresh();
    });
  });

  // Пустой <input type="file"> в multipart ломает сохранение (FastAPI 422)
  document.querySelectorAll('form[enctype="multipart/form-data"]').forEach((form) => {
    form.addEventListener('submit', () => {
      form.querySelectorAll('input[type="file"]').forEach((input) => {
        if (!input.files || input.files.length === 0) {
          input.disabled = true;
        }
      });
    });
  });

  // Автор: обычный select, «Другой…» открывает поле для нового имени
  function syncAuthorField(wrap) {
    const select = wrap.querySelector('[data-author-select]');
    const custom = wrap.querySelector('[data-author-custom]');
    if (!select || !custom) return;
    const name = select.dataset.authorName || 'author';
    const isCustom = select.value === '__custom__';
    custom.classList.toggle('hidden', !isCustom);
    if (isCustom) {
      select.removeAttribute('name');
      custom.setAttribute('name', name);
      custom.required = select.hasAttribute('required') || select.dataset.wasRequired === '1';
      if (!custom.value) custom.focus();
    } else {
      custom.removeAttribute('name');
      custom.required = false;
      select.setAttribute('name', name);
    }
  }

  document.querySelectorAll('[data-author-field]').forEach((wrap) => {
    const select = wrap.querySelector('[data-author-select]');
    if (select && select.required) select.dataset.wasRequired = '1';
    syncAuthorField(wrap);
  });

  document.addEventListener('change', (e) => {
    const select = e.target.closest('[data-author-select]');
    if (!select) return;
    const wrap = select.closest('[data-author-field]');
    if (wrap) syncAuthorField(wrap);
  });
  </script>
</body>
</html>
